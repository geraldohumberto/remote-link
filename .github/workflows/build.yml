name: Build — RemoteLink

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Dependencias do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libxdo-dev \
            libx11-dev \
            libxcb1-dev \
            libxrandr-dev \
            libdbus-1-dev \
            libssl-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf2.0-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev

      - name: Instalar Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: linux-cargo-${{ hashFiles('peer/Cargo.toml', 'relay/Cargo.toml') }}

      - name: Build peer (Linux)
        working-directory: peer
        run: cargo build --release

      - name: Build relay (Linux)
        working-directory: relay
        run: cargo build --release

      - name: Preparar artefatos Linux
        run: |
          mkdir -p dist
          cp peer/target/release/remote-link        dist/remote-link-linux
          cp relay/target/release/remote-link-relay dist/remote-link-relay-linux
          chmod +x dist/remote-link-linux dist/remote-link-relay-linux

      - name: Upload artefatos Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: dist/

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-cargo-${{ hashFiles('peer/Cargo.toml', 'relay/Cargo.toml') }}

      - name: Build peer (Windows)
        working-directory: peer
        run: cargo build --release

      - name: Build relay (Windows)
        working-directory: relay
        run: cargo build --release

      - name: Preparar artefatos Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item peer\target\release\remote-link.exe        dist\remote-link-windows.exe
          Copy-Item relay\target\release\remote-link-relay.exe dist\remote-link-relay-windows.exe

      - name: Upload artefatos Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: dist/

  release:
    name: Publicar Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artefatos Linux
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: dist/

      - name: Download artefatos Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: dist/

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/remote-link-linux
            dist/remote-link-relay-linux
            dist/remote-link-windows.exe
            dist/remote-link-relay-windows.exe
          body: |
            ## RemoteLink ${{ github.ref_name }}

            | Arquivo | Sistema | Uso |
            |---|---|---|
            | `remote-link-linux` | Linux | Peer — cliente + host |
            | `remote-link-windows.exe` | Windows | Peer — cliente + host |
            | `remote-link-relay-linux` | Linux | Servidor de ponte |
            | `remote-link-relay-windows.exe` | Windows | Servidor de ponte |

            **Linux:** `chmod +x remote-link-linux && ./remote-link-linux`
            **Windows:** duplo clique em `remote-link-windows.exe`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
